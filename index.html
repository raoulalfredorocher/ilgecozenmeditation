<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="禅タイマー" />
  <meta name="theme-color" content="#1a1a18" />
  <link rel="manifest" href="manifest.json" />
  <title>禅 Timer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;400&family=Noto+Sans+JP:wght@100;200;300&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #1a1a18;
      --paper:  #f5f0e8;
      --warm:   #e8e0d0;
      --stone:  #9a9080;
      --red:    #8b2020;
      --gold:   #c8a84b;
      --radius: 2px;
    }

    html, body {
      height: 100%;
      background: var(--ink);
      color: var(--paper);
      font-family: 'Noto Serif JP', serif;
      font-weight: 200;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      user-select: none;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px);
    }

    /* ─── Header ─── */
    header {
      width: 100%;
      max-width: 400px;
      text-align: center;
      padding: 28px 0 16px;
      border-bottom: 1px solid #333;
      margin-bottom: 24px;
    }
    header .kanji {
      font-size: 2rem;
      letter-spacing: .4em;
      color: var(--gold);
      font-weight: 300;
    }
    header .subtitle {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 100;
      font-size: .65rem;
      letter-spacing: .25em;
      color: var(--stone);
      margin-top: 4px;
      text-transform: uppercase;
    }

    /* ─── Main clock ─── */
    #clock-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 10px 0 28px;
    }
    #ring-svg { width: 220px; height: 220px; transform: rotate(-90deg); }
    #ring-bg   { fill: none; stroke: #2a2a28; stroke-width: 5; }
    #ring-fill { fill: none; stroke: var(--gold); stroke-width: 5;
                 stroke-linecap: round; transition: stroke-dashoffset .5s linear; }
    #clock-time {
      position: absolute;
      font-size: 2.8rem;
      font-weight: 200;
      letter-spacing: .05em;
      color: var(--paper);
    }
    #clock-label {
      position: absolute;
      bottom: 42px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: .6rem;
      letter-spacing: .2em;
      color: var(--stone);
      font-weight: 100;
    }
    #clock-step {
      position: absolute;
      top: 42px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: .58rem;
      letter-spacing: .15em;
      color: var(--stone);
      font-weight: 100;
    }

    /* ─── Controls ─── */
    #controls {
      display: flex;
      gap: 20px;
      margin-bottom: 32px;
    }
    .btn {
      background: none;
      border: 1px solid #444;
      color: var(--paper);
      font-family: 'Noto Serif JP', serif;
      font-size: .75rem;
      letter-spacing: .2em;
      padding: 10px 22px;
      cursor: pointer;
      border-radius: var(--radius);
      transition: border-color .2s, color .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active  { border-color: var(--gold); color: var(--gold); }
    .btn.primary { border-color: var(--gold); color: var(--gold); font-weight: 300; }
    .btn.primary:active { background: rgba(200,168,75,.1); }
    .btn.danger  { border-color: #5a2020; color: #c06060; }
    .btn.danger:active  { border-color: var(--red); color: var(--red); }

    /* ─── Sequence list ─── */
    section.panel {
      width: 100%;
      max-width: 400px;
      margin-bottom: 24px;
    }
    .panel-title {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: .58rem;
      letter-spacing: .3em;
      color: var(--stone);
      text-transform: uppercase;
      margin-bottom: 12px;
      font-weight: 100;
    }

    #step-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .step-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border: 1px solid #2e2e2c;
      border-radius: var(--radius);
      background: #1e1e1c;
      transition: border-color .2s;
    }
    .step-item.active { border-color: var(--gold); }
    .step-item.done   { opacity: .38; }
    .step-num {
      font-size: .58rem;
      color: var(--stone);
      width: 16px;
      text-align: center;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 100;
    }
    .step-mins {
      flex: 1;
      font-size: 1.1rem;
      font-weight: 300;
      color: var(--paper);
    }
    .step-mins span { font-size: .6rem; color: var(--stone); margin-left: 4px; font-family: 'Noto Sans JP', sans-serif; font-weight: 100; }
    .step-del {
      background: none;
      border: none;
      color: #4a3030;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 6px;
      -webkit-tap-highlight-color: transparent;
    }
    .step-del:active { color: var(--red); }

    /* ─── Add step row ─── */
    #add-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 12px;
    }
    #new-mins {
      flex: 1;
      background: #1e1e1c;
      border: 1px solid #333;
      border-radius: var(--radius);
      color: var(--paper);
      font-family: 'Noto Serif JP', serif;
      font-size: 1rem;
      font-weight: 200;
      padding: 10px 12px;
      text-align: center;
      -webkit-appearance: none;
      outline: none;
    }
    #new-mins:focus { border-color: var(--gold); }

    /* ─── Saved presets ─── */
    #preset-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .preset-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      border: 1px solid #2e2e2c;
      border-radius: var(--radius);
      background: #1e1e1c;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .preset-item:active { border-color: var(--gold); }
    .preset-name { flex: 1; font-size: .8rem; font-weight: 300; color: var(--paper); }
    .preset-desc { font-size: .58rem; color: var(--stone); font-family: 'Noto Sans JP', sans-serif; font-weight: 100; }
    .preset-del  { background: none; border: none; color: #4a3030; font-size: 1rem; cursor: pointer; padding: 4px 6px; -webkit-tap-highlight-color: transparent; }
    .preset-del:active { color: var(--red); }

    /* ─── Save row ─── */
    #save-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }
    #preset-name-input {
      flex: 1;
      background: #1e1e1c;
      border: 1px solid #333;
      border-radius: var(--radius);
      color: var(--paper);
      font-family: 'Noto Serif JP', serif;
      font-size: .8rem;
      font-weight: 200;
      padding: 10px 12px;
      outline: none;
    }
    #preset-name-input:focus  { border-color: var(--gold); }
    #preset-name-input::placeholder { color: #555; }

    /* ─── Bell flash ─── */
    #bell-flash {
      position: fixed; inset: 0;
      background: rgba(200,168,75,.06);
      pointer-events: none;
      opacity: 0;
      transition: opacity .4s;
      z-index: 999;
    }
    #bell-flash.ring { opacity: 1; }

    /* ─── Divider ─── */
    .divider {
      width: 100%;
      max-width: 400px;
      border: none;
      border-top: 1px solid #2a2a28;
      margin: 4px 0 20px;
    }

    /* ─── Empty state ─── */
    .empty { color: var(--stone); font-size: .65rem; letter-spacing: .15em; font-family: 'Noto Sans JP', sans-serif; font-weight: 100; text-align: center; padding: 14px 0; }
  </style>
</head>
<body>

<div id="bell-flash"></div>

<header>
  <div class="kanji">禅　タイマー</div>
  <div class="subtitle">Zen Meditation Timer</div>
</header>

<!-- Clock -->
<div id="clock-wrap">
  <svg id="ring-svg" viewBox="0 0 220 220">
    <circle id="ring-bg"   cx="110" cy="110" r="96"/>
    <circle id="ring-fill" cx="110" cy="110" r="96"/>
  </svg>
  <div id="clock-step"></div>
  <div id="clock-time">—</div>
  <div id="clock-label">pronto</div>
</div>

<!-- Controls -->
<div id="controls">
  <button class="btn danger"   id="btn-reset">reset</button>
  <button class="btn primary"  id="btn-start">avvia</button>
</div>

<!-- Sequence builder -->
<section class="panel">
  <div class="panel-title">sequenza</div>
  <ul id="step-list"></ul>
  <div id="add-row">
    <input id="new-mins" type="number" min="1" max="120" placeholder="minuti" />
    <button class="btn" id="btn-add">+ aggiungi</button>
  </div>
</section>

<hr class="divider"/>

<!-- Saved presets -->
<section class="panel">
  <div class="panel-title">sequenze salvate</div>
  <div id="preset-list"></div>
  <div id="save-row">
    <input id="preset-name-input" type="text" placeholder="nome sequenza…" maxlength="28"/>
    <button class="btn" id="btn-save">salva</button>
  </div>
</section>

<script>
// ─── Audio: campana buddista con Web Audio API ───────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function ringBell(times, cb) {
  ensureAudio();
  const flash = document.getElementById('bell-flash');
  let i = 0;
  function strike() {
    if (i >= times) { if (cb) cb(); return; }
    i++;
    // campana buddista: sine fade con risonanza lunga
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const biquad = audioCtx.createBiquadFilter();

    biquad.type = 'bandpass';
    biquad.frequency.value = 630;
    biquad.Q.value = 18;

    osc.connect(biquad);
    biquad.connect(gain);
    gain.connect(audioCtx.destination);

    osc.type = 'sine';
    osc.frequency.setValueAtTime(630, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(580, audioCtx.currentTime + 3.5);

    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.45, audioCtx.currentTime + 0.04);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 4.5);

    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 4.5);

    // overtone
    const osc2  = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.connect(gain2); gain2.connect(audioCtx.destination);
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(1260, audioCtx.currentTime);
    osc2.frequency.exponentialRampToValueAtTime(1150, audioCtx.currentTime + 2);
    gain2.gain.setValueAtTime(0, audioCtx.currentTime);
    gain2.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + 0.03);
    gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.5);
    osc2.start(audioCtx.currentTime);
    osc2.stop(audioCtx.currentTime + 2.5);

    // flash visivo
    flash.classList.add('ring');
    setTimeout(() => flash.classList.remove('ring'), 400);

    setTimeout(strike, 5000);
  }
  strike();
}

// ─── State ───────────────────────────────────────────────────────────────────
let steps    = [];          // [{mins}]
let current  = 0;           // index step corrente
let remaining = 0;          // secondi rimasti
let running  = false;
let ticker   = null;

// ─── DOM refs ────────────────────────────────────────────────────────────────
const clockTime  = document.getElementById('clock-time');
const clockLabel = document.getElementById('clock-label');
const clockStep  = document.getElementById('clock-step');
const ringFill   = document.getElementById('ring-fill');
const btnStart   = document.getElementById('btn-start');
const btnReset   = document.getElementById('btn-reset');
const stepList   = document.getElementById('step-list');
const newMins    = document.getElementById('new-mins');
const btnAdd     = document.getElementById('btn-add');
const presetList = document.getElementById('preset-list');
const presetName = document.getElementById('preset-name-input');
const btnSave    = document.getElementById('btn-save');

// ─── Ring SVG ─────────────────────────────────────────────────────────────────
const CIRC = 2 * Math.PI * 96; // circonferenza r=96
ringFill.style.strokeDasharray  = CIRC;
ringFill.style.strokeDashoffset = CIRC;

function setRing(fraction) {
  ringFill.style.strokeDashoffset = CIRC * (1 - fraction);
}

// ─── Clock display ───────────────────────────────────────────────────────────
function fmtTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function updateClock() {
  if (steps.length === 0) {
    clockTime.textContent  = '—';
    clockLabel.textContent = 'pronto';
    clockStep.textContent  = '';
    setRing(0);
    return;
  }
  const total = steps[current].mins * 60;
  clockTime.textContent  = fmtTime(remaining);
  clockLabel.textContent = running ? 'in corso' : (remaining < total ? 'pausa' : 'pronto');
  clockStep.textContent  = `${current + 1} / ${steps.length}`;
  setRing(remaining / total);
}

// ─── Step list render ─────────────────────────────────────────────────────────
function renderSteps() {
  stepList.innerHTML = '';
  if (steps.length === 0) {
    stepList.innerHTML = '<li class="empty">nessun intervallo</li>';
    return;
  }
  steps.forEach((s, i) => {
    const li = document.createElement('li');
    li.className = 'step-item' +
      (i === current && (running || remaining < s.mins * 60) ? ' active' : '') +
      (i < current ? ' done' : '');
    li.innerHTML = `
      <span class="step-num">${i + 1}</span>
      <span class="step-mins">${s.mins}<span>min</span></span>
      <button class="step-del" data-i="${i}" aria-label="rimuovi">✕</button>`;
    stepList.appendChild(li);
  });
  stepList.querySelectorAll('.step-del').forEach(b =>
    b.addEventListener('click', e => {
      const idx = +e.currentTarget.dataset.i;
      if (running) return;
      steps.splice(idx, 1);
      if (current >= steps.length) current = Math.max(0, steps.length - 1);
      resetTimer();
      renderSteps();
    })
  );
}

// ─── Timer engine ─────────────────────────────────────────────────────────────
function loadStep(idx) {
  current   = idx;
  remaining = steps[idx].mins * 60;
  updateClock();
  renderSteps();
}

function nextStep() {
  if (current + 1 < steps.length) {
    ringBell(3, () => {
      loadStep(current + 1);
      startTicker();
    });
  } else {
    // sequenza finita
    ringBell(3, () => {
      running = false;
      btnStart.textContent = 'avvia';
      clockLabel.textContent = 'completato';
      setRing(0);
      clockStep.textContent = '';
      renderSteps();
    });
  }
}

function startTicker() {
  clearInterval(ticker);
  running = true;
  btnStart.textContent = 'pausa';
  ticker = setInterval(() => {
    if (remaining <= 0) {
      clearInterval(ticker);
      nextStep();
      return;
    }
    remaining--;
    updateClock();
  }, 1000);
}

function pauseTicker() {
  clearInterval(ticker);
  running = false;
  btnStart.textContent = 'riprendi';
  clockLabel.textContent = 'pausa';
}

function resetTimer() {
  clearInterval(ticker);
  running = false;
  current = 0;
  btnStart.textContent = 'avvia';
  if (steps.length > 0) {
    remaining = steps[0].mins * 60;
  } else {
    remaining = 0;
  }
  updateClock();
  renderSteps();
}

// ─── Button handlers ──────────────────────────────────────────────────────────
btnStart.addEventListener('click', () => {
  ensureAudio();
  if (steps.length === 0) return;
  if (running) {
    pauseTicker();
  } else {
    if (remaining === 0 || clockLabel.textContent === 'completato') {
      loadStep(0);
    }
    startTicker();
  }
});

btnReset.addEventListener('click', () => {
  resetTimer();
});

btnAdd.addEventListener('click', () => {
  const v = parseInt(newMins.value);
  if (!v || v < 1 || v > 120) { newMins.focus(); return; }
  steps.push({ mins: v });
  newMins.value = '';
  if (steps.length === 1) remaining = v * 60;
  updateClock();
  renderSteps();
});

newMins.addEventListener('keydown', e => {
  if (e.key === 'Enter') btnAdd.click();
});

// ─── Presets (localStorage) ───────────────────────────────────────────────────
function loadPresets() {
  try { return JSON.parse(localStorage.getItem('zen_presets') || '[]'); }
  catch { return []; }
}
function savePresets(p) {
  localStorage.setItem('zen_presets', JSON.stringify(p));
}

function renderPresets() {
  const presets = loadPresets();
  presetList.innerHTML = '';
  if (presets.length === 0) {
    presetList.innerHTML = '<div class="empty">nessuna sequenza salvata</div>';
    return;
  }
  presets.forEach((p, i) => {
    const d = document.createElement('div');
    d.className = 'preset-item';
    const desc = p.steps.map(s => s.mins + 'min').join(' · ');
    d.innerHTML = `
      <div style="flex:1">
        <div class="preset-name">${p.name}</div>
        <div class="preset-desc">${desc}</div>
      </div>
      <button class="preset-del" data-i="${i}" aria-label="elimina">✕</button>`;
    d.addEventListener('click', e => {
      if (e.target.classList.contains('preset-del')) return;
      if (running) return;
      steps = p.steps.map(s => ({ mins: s.mins }));
      resetTimer();
    });
    d.querySelector('.preset-del').addEventListener('click', e => {
      e.stopPropagation();
      const arr = loadPresets();
      arr.splice(i, 1);
      savePresets(arr);
      renderPresets();
    });
    presetList.appendChild(d);
  });
}

btnSave.addEventListener('click', () => {
  const name = presetName.value.trim();
  if (!name || steps.length === 0) { presetName.focus(); return; }
  const arr = loadPresets();
  arr.push({ name, steps: steps.map(s => ({ mins: s.mins })) });
  savePresets(arr);
  presetName.value = '';
  renderPresets();
});

// ─── Init ─────────────────────────────────────────────────────────────────────
renderSteps();
renderPresets();
updateClock();
</script>
</body>
</html>
