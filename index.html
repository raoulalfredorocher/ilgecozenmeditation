<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="禅タイマー"/>
  <meta name="theme-color" content="#f0ebe0"/>
  <link rel="manifest" href="manifest.json"/>
  <title>禅 Timer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f0ebe0;
      --surface:  #e8e2d5;
      --card:     #faf7f2;
      --border:   #d6cfc2;
      --text:     #3a3228;
      --muted:    #8a7e72;
      --gold:     #b8924a;
      --red:      #9b3a2a;
      --green:    #4a7c5a;
      --ring-bg:  #ddd6c8;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "Hiragino Mincho ProN", Georgia, serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 30px);
      max-width: 420px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      width: 100%;
      text-align: center;
      padding: 24px 0 18px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }
    .kanji {
      font-size: 1.7rem;
      letter-spacing: .45em;
      color: var(--gold);
      font-weight: 400;
    }
    .subtitle {
      font-size: .6rem;
      letter-spacing: .3em;
      color: var(--muted);
      margin-top: 4px;
      text-transform: uppercase;
    }

    /* ── SCREENS ── */
    .screen { width: 100%; display: none; flex-direction: column; align-items: center; }
    .screen.active { display: flex; }

    /* ══════════════════════════════════════
       SCREEN 1 — CONFIGURAZIONE
    ══════════════════════════════════════ */

    /* Picker rotella */
    .picker-section {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px 20px 18px;
      margin-bottom: 20px;
    }
    .picker-label {
      font-size: .6rem;
      letter-spacing: .3em;
      color: var(--muted);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 14px;
    }
    .picker-wrap {
      position: relative;
      height: 160px;
      overflow: hidden;
      cursor: grab;
    }
    .picker-wrap::before,
    .picker-wrap::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 56px;
      z-index: 2;
      pointer-events: none;
    }
    .picker-wrap::before { top: 0;    background: linear-gradient(to bottom, var(--card) 10%, transparent); }
    .picker-wrap::after  { bottom: 0; background: linear-gradient(to top,    var(--card) 10%, transparent); }
    .picker-highlight {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 80%; height: 48px;
      border-top: 1.5px solid var(--gold);
      border-bottom: 1.5px solid var(--gold);
      border-radius: 4px;
      pointer-events: none;
      z-index: 3;
    }
    .picker-drum {
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform .12s ease-out;
      padding: 56px 0;
    }
    .picker-item {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 300;
      color: var(--muted);
      width: 120px;
      transition: color .15s, font-size .15s;
      user-select: none;
    }
    .picker-item.selected {
      color: var(--text);
      font-size: 2rem;
      font-weight: 400;
    }
    .picker-item small {
      font-size: .65rem;
      color: var(--muted);
      margin-left: 5px;
      letter-spacing: .1em;
    }

    /* Add step button */
    .btn-add-step {
      width: 100%;
      background: var(--card);
      border: 1.5px dashed var(--border);
      border-radius: 12px;
      color: var(--gold);
      font-size: .85rem;
      letter-spacing: .15em;
      padding: 14px;
      cursor: pointer;
      transition: background .2s, border-color .2s;
      margin-bottom: 20px;
      font-family: inherit;
    }
    .btn-add-step:active { background: var(--surface); border-color: var(--gold); }

    /* Step list */
    .config-steps {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }
    .config-step {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color .2s;
    }
    .config-step-num {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem;
      color: var(--muted);
      flex-shrink: 0;
    }
    .config-step-val {
      flex: 1;
      font-size: 1.15rem;
      font-weight: 400;
      color: var(--text);
    }
    .config-step-val span {
      font-size: .65rem;
      color: var(--muted);
      margin-left: 4px;
      letter-spacing: .1em;
    }
    .config-step-del {
      background: none; border: none;
      color: var(--border); font-size: 1.1rem;
      cursor: pointer; padding: 4px 6px;
      transition: color .2s;
    }
    .config-step-del:active { color: var(--red); }

    /* Preset section */
    .section-title {
      width: 100%;
      font-size: .6rem;
      letter-spacing: .3em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .preset-grid {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }
    .preset-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .preset-card:active { background: var(--surface); border-color: var(--gold); }
    .preset-bell { font-size: 1.1rem; flex-shrink: 0; }
    .preset-info { flex: 1; }
    .preset-name { font-size: .88rem; font-weight: 500; color: var(--text); }
    .preset-desc { font-size: .7rem; color: var(--muted); margin-top: 2px; letter-spacing: .05em; }
    .preset-del  { background: none; border: none; color: var(--border); font-size: 1rem; cursor: pointer; padding: 4px 6px; }
    .preset-del:active { color: var(--red); }

    /* Save preset row */
    .save-row {
      width: 100%;
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }
    .save-input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: .88rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color .2s;
    }
    .save-input:focus { border-color: var(--gold); }
    .save-input::placeholder { color: var(--border); }

    /* Main CTA */
    .btn-avvia {
      width: 100%;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: .95rem;
      font-weight: 500;
      letter-spacing: .2em;
      padding: 18px;
      cursor: pointer;
      transition: background .2s, transform .1s;
      margin-bottom: 8px;
    }
    .btn-avvia:active { background: var(--gold); transform: scale(.98); }

    .btn-save-preset {
      width: 100%;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      font-family: inherit;
      font-size: .82rem;
      letter-spacing: .15em;
      color: var(--muted);
      padding: 13px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
      margin-bottom: 28px;
    }
    .btn-save-preset:active { border-color: var(--gold); color: var(--gold); }

    .empty-steps {
      width: 100%;
      text-align: center;
      padding: 20px 0;
      color: var(--muted);
      font-size: .78rem;
      letter-spacing: .1em;
    }

    /* ══════════════════════════════════════
       SCREEN 2 — TIMER
    ══════════════════════════════════════ */

    .timer-steps-row {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .timer-step-pill {
      padding: 5px 14px;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .05em;
      transition: all .3s;
    }
    .timer-step-pill.active {
      background: var(--text);
      border-color: var(--text);
      color: var(--bg);
    }
    .timer-step-pill.done {
      opacity: .35;
    }

    /* Clock ring */
    #clock-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 36px;
    }
    #ring-svg { width: 240px; height: 240px; transform: rotate(-90deg); }
    #ring-bg   { fill: none; stroke: var(--ring-bg); stroke-width: 6; }
    #ring-fill {
      fill: none; stroke: var(--gold); stroke-width: 6; stroke-linecap: round;
      transition: stroke-dashoffset .9s linear;
    }
    #clock-time {
      position: absolute;
      font-size: 3.4rem;
      font-weight: 200;
      letter-spacing: .04em;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    #clock-min-label {
      position: absolute;
      bottom: 52px;
      font-size: .58rem;
      letter-spacing: .25em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Timer buttons */
    .timer-btns {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
    }
    .btn-timer {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: .78rem;
      letter-spacing: .15em;
      padding: 12px 26px;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-timer.primary {
      background: var(--text);
      border-color: var(--text);
      color: var(--bg);
      padding: 12px 40px;
    }
    .btn-timer.primary:active { background: var(--gold); border-color: var(--gold); }
    .btn-timer:active { border-color: var(--muted); }

    .btn-back {
      background: none; border: none;
      font-family: inherit; font-size: .72rem;
      letter-spacing: .15em; color: var(--muted);
      cursor: pointer; padding: 8px;
      text-transform: uppercase;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* Bell flash overlay */
    #bell-flash {
      position: fixed; inset: 0;
      background: rgba(184, 146, 74, .12);
      pointer-events: none; opacity: 0;
      transition: opacity .5s; z-index: 999;
    }
    #bell-flash.ring { opacity: 1; }

    /* Done screen overlay */
    #done-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 12px;
    }
    #done-overlay.show { display: flex; }
    .done-kanji { font-size: 3.5rem; color: var(--gold); letter-spacing: .3em; }
    .done-text  { font-size: .8rem; letter-spacing: .3em; color: var(--muted); text-transform: uppercase; }
    .done-sub   { font-size: .65rem; letter-spacing: .2em; color: var(--border); margin-top: 4px; }
    .btn-done   {
      margin-top: 24px;
      background: var(--text); color: var(--bg);
      border: none; border-radius: 12px;
      font-family: inherit; font-size: .82rem;
      letter-spacing: .2em; padding: 14px 32px;
      cursor: pointer;
    }

    footer {
      margin-top: 24px; width: 100%;
      border-top: 1px solid var(--border); padding-top: 14px;
      text-align: center; font-size: .55rem;
      letter-spacing: .15em; color: var(--border);
    }
  </style>
</head>
<body>

<div id="bell-flash"></div>

<!-- DONE OVERLAY -->
<div id="done-overlay">
  <div class="done-kanji">禅</div>
  <div class="done-text">Sessione completata</div>
  <div class="done-sub">三度の鐘 — tre rintocchi</div>
  <button class="btn-done" id="btn-done-back">nuova sessione</button>
</div>

<header>
  <div class="kanji">禅　タイマー</div>
  <div class="subtitle">Zen Meditation Timer</div>
</header>

<!-- ══ SCREEN 1: CONFIG ══ -->
<div class="screen active" id="screen-config">

  <!-- Picker rotella -->
  <div class="picker-section">
    <div class="picker-label">seleziona minuti</div>
    <div class="picker-wrap" id="picker-wrap">
      <div class="picker-highlight"></div>
      <div class="picker-drum" id="picker-drum"></div>
    </div>
  </div>

  <!-- Add step -->
  <button class="btn-add-step" id="btn-add">＋ aggiungi intervallo</button>

  <!-- Step list -->
  <div class="config-steps" id="config-steps">
    <div class="empty-steps" id="empty-steps">nessun intervallo aggiunto</div>
  </div>

  <!-- Preset section -->
  <div class="section-title">sequenze salvate</div>
  <div class="preset-grid" id="preset-grid"></div>

  <!-- Save row -->
  <input class="save-input" id="preset-name" type="text" placeholder="nome sequenza da salvare…" maxlength="28"/>
  <button class="btn-save-preset" id="btn-save-preset">&#9675; salva sequenza corrente</button>

  <!-- Avvia -->
  <button class="btn-avvia" id="btn-avvia">inizia meditazione</button>

</div>

<!-- ══ SCREEN 2: TIMER ══ -->
<div class="screen" id="screen-timer">

  <div class="timer-steps-row" id="timer-steps-row"></div>

  <div id="clock-wrap">
    <svg id="ring-svg" viewBox="0 0 240 240">
      <circle id="ring-bg"   cx="120" cy="120" r="104"/>
      <circle id="ring-fill" cx="120" cy="120" r="104"/>
    </svg>
    <div id="clock-time">00:00</div>
    <div id="clock-min-label"></div>
  </div>

  <div class="timer-btns">
    <button class="btn-timer" id="btn-reset">reset</button>
    <button class="btn-timer primary" id="btn-start">avvia</button>
  </div>

  <button class="btn-back" id="btn-back">← modifica sequenza</button>

</div>

<footer>Made with IBM Bob</footer>

<script>
// ─────────────────────────────────────────────
// AUDIO — Campana buddista sintetizzata
// Risonanza lunga, 3 parziali, tono caldo
// ─────────────────────────────────────────────
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playBellStrike() {
  ensureAudio();
  const now = audioCtx.currentTime;

  // Parziali della campana buddista (fondamentale + overtone)
  const partials = [
    { freq: 210, gain: 0.55, decay: 6.0 },
    { freq: 476, gain: 0.28, decay: 4.5 },
    { freq: 840, gain: 0.12, decay: 2.8 },
    { freq: 1260,gain: 0.05, decay: 1.6 },
  ];

  partials.forEach(p => {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const comp = audioCtx.createDynamicsCompressor();

    osc.connect(gain);
    gain.connect(comp);
    comp.connect(audioCtx.destination);

    osc.type = 'sine';
    osc.frequency.setValueAtTime(p.freq, now);
    osc.frequency.exponentialRampToValueAtTime(p.freq * 0.994, now + p.decay);

    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(p.gain, now + 0.008);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + p.decay);

    osc.start(now);
    osc.stop(now + p.decay + 0.1);
  });

  // Flash visivo
  const flash = document.getElementById('bell-flash');
  flash.classList.add('ring');
  setTimeout(() => flash.classList.remove('ring'), 600);
}

function ringBell(times, cb) {
  ensureAudio();
  let i = 0;
  function strike() {
    if (i >= times) { if (cb) cb(); return; }
    i++;
    playBellStrike();
    setTimeout(strike, 4800);
  }
  strike();
}

// ─────────────────────────────────────────────
// PICKER ROTELLA
// ─────────────────────────────────────────────
const ITEM_H   = 48;
const MIN_VALS = [];
for (let i = 1; i <= 90; i++) MIN_VALS.push(i);

let pickerIndex = 19; // default 20 min
const drum = document.getElementById('picker-drum');
const wrap = document.getElementById('picker-wrap');

function buildDrum() {
  drum.innerHTML = '';
  MIN_VALS.forEach((v, i) => {
    const el = document.createElement('div');
    el.className = 'picker-item' + (i === pickerIndex ? ' selected' : '');
    el.innerHTML = `${v}<small>min</small>`;
    drum.appendChild(el);
  });
  setDrumPos(pickerIndex, false);
}

function setDrumPos(idx, animate) {
  if (!animate) drum.style.transition = 'none';
  else drum.style.transition = 'transform .18s ease-out';
  drum.style.transform = `translateY(${-idx * ITEM_H}px)`;
  // aggiorna selected
  drum.querySelectorAll('.picker-item').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
  pickerIndex = Math.max(0, Math.min(MIN_VALS.length - 1, idx));
}

// Touch / mouse drag
let dragStart = null, dragBase = null;
function onDragStart(e) {
  dragStart = (e.touches ? e.touches[0].clientY : e.clientY);
  dragBase  = pickerIndex;
  drum.style.transition = 'none';
}
function onDragMove(e) {
  if (dragStart === null) return;
  const y    = (e.touches ? e.touches[0].clientY : e.clientY);
  const diff = Math.round((dragStart - y) / ITEM_H);
  const idx  = Math.max(0, Math.min(MIN_VALS.length - 1, dragBase + diff));
  setDrumPos(idx, false);
}
function onDragEnd() {
  dragStart = null;
  // snap
  drum.style.transition = 'transform .15s ease-out';
}

wrap.addEventListener('touchstart',  onDragStart, {passive: true});
wrap.addEventListener('touchmove',   onDragMove,  {passive: true});
wrap.addEventListener('touchend',    onDragEnd);
wrap.addEventListener('mousedown',   onDragStart);
wrap.addEventListener('mousemove',   onDragMove);
wrap.addEventListener('mouseup',     onDragEnd);
wrap.addEventListener('mouseleave',  onDragEnd);

// Scroll wheel
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const dir = e.deltaY > 0 ? 1 : -1;
  setDrumPos(pickerIndex + dir, true);
}, { passive: false });

buildDrum();

// ─────────────────────────────────────────────
// STEPS
// ─────────────────────────────────────────────
let steps = [];

function renderConfigSteps() {
  const container = document.getElementById('config-steps');
  const empty     = document.getElementById('empty-steps');
  container.querySelectorAll('.config-step').forEach(el => el.remove());
  if (!steps.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  steps.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'config-step';
    el.innerHTML = `
      <div class="config-step-num">${i + 1}</div>
      <div class="config-step-val">${s.mins}<span>minuti</span></div>
      <button class="config-step-del" data-i="${i}" aria-label="rimuovi">✕</button>`;
    container.appendChild(el);
  });
  container.querySelectorAll('.config-step-del').forEach(b =>
    b.addEventListener('click', e => {
      steps.splice(+e.currentTarget.dataset.i, 1);
      renderConfigSteps();
    })
  );
}

document.getElementById('btn-add').addEventListener('click', () => {
  steps.push({ mins: MIN_VALS[pickerIndex] });
  renderConfigSteps();
});

// ─────────────────────────────────────────────
// PRESETS
// ─────────────────────────────────────────────
function loadPresets()  { try { return JSON.parse(localStorage.getItem('zen_v2')||'[]'); } catch { return []; } }
function savePresets(p) { localStorage.setItem('zen_v2', JSON.stringify(p)); }

function renderPresets() {
  const grid = document.getElementById('preset-grid');
  const ps   = loadPresets();
  grid.innerHTML = '';
  if (!ps.length) {
    grid.innerHTML = '<div style="color:var(--muted);font-size:.72rem;letter-spacing:.1em;padding:8px 0 12px;">nessuna sequenza salvata</div>';
    return;
  }
  ps.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'preset-card';
    const desc = p.steps.map(s => s.mins + '\'').join(' + ');
    card.innerHTML = `
      <div class="preset-bell">&#9670;</div>
      <div class="preset-info">
        <div class="preset-name">${p.name}</div>
        <div class="preset-desc">${desc}</div>
      </div>
      <button class="preset-del" data-i="${i}" aria-label="elimina">✕</button>`;
    card.addEventListener('click', e => {
      if (e.target.classList.contains('preset-del')) return;
      steps = p.steps.map(s => ({ mins: s.mins }));
      renderConfigSteps();
    });
    card.querySelector('.preset-del').addEventListener('click', e => {
      e.stopPropagation();
      const arr = loadPresets(); arr.splice(i, 1); savePresets(arr); renderPresets();
    });
    grid.appendChild(card);
  });
}

document.getElementById('btn-save-preset').addEventListener('click', () => {
  const name = document.getElementById('preset-name').value.trim();
  if (!name || !steps.length) {
    document.getElementById('preset-name').focus(); return;
  }
  const arr = loadPresets();
  arr.push({ name, steps: steps.map(s => ({ mins: s.mins })) });
  savePresets(arr);
  document.getElementById('preset-name').value = '';
  renderPresets();
});

renderConfigSteps();
renderPresets();

// ─────────────────────────────────────────────
// SCREEN SWITCH
// ─────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

document.getElementById('btn-avvia').addEventListener('click', () => {
  ensureAudio();
  if (!steps.length) { document.getElementById('btn-add').focus(); return; }
  initTimer();
  showScreen('screen-timer');
});

document.getElementById('btn-back').addEventListener('click', () => {
  stopTimer();
  showScreen('screen-config');
});

document.getElementById('btn-done-back').addEventListener('click', () => {
  document.getElementById('done-overlay').classList.remove('show');
  stopTimer();
  showScreen('screen-config');
});

// ─────────────────────────────────────────────
// TIMER ENGINE
// ─────────────────────────────────────────────
const CIRC = 2 * Math.PI * 104;
document.getElementById('ring-fill').style.strokeDasharray  = CIRC;
document.getElementById('ring-fill').style.strokeDashoffset = CIRC;

let current = 0, remaining = 0, running = false, ticker = null;

function setRing(f) {
  document.getElementById('ring-fill').style.strokeDashoffset = CIRC * (1 - Math.max(0, f));
}
function fmtTime(s) {
  const m = Math.floor(s / 60), ss = s % 60;
  return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}

function renderTimerPills() {
  const row = document.getElementById('timer-steps-row');
  row.innerHTML = '';
  steps.forEach((s, i) => {
    const pill = document.createElement('div');
    pill.className = 'timer-step-pill' +
      (i === current ? ' active' : '') +
      (i < current  ? ' done'   : '');
    pill.textContent = s.mins + '\'';
    row.appendChild(pill);
  });
}

function updateClock() {
  const total = steps[current].mins * 60;
  document.getElementById('clock-time').textContent = fmtTime(remaining);
  document.getElementById('clock-min-label').textContent = steps[current].mins + ' min';
  setRing(remaining / total);
  renderTimerPills();
}

function initTimer() {
  current   = 0;
  remaining = steps[0].mins * 60;
  running   = false;
  document.getElementById('btn-start').textContent = 'avvia';
  updateClock();
}

function stopTimer() {
  clearInterval(ticker);
  running = false;
}

function loadStep(idx) {
  current   = idx;
  remaining = steps[idx].mins * 60;
  updateClock();
}

function nextStep() {
  if (current + 1 < steps.length) {
    ringBell(3, () => { loadStep(current + 1); startTicker(); });
  } else {
    ringBell(3, () => {
      running = false;
      document.getElementById('btn-start').textContent = 'avvia';
      setRing(0);
      document.getElementById('clock-time').textContent = '00:00';
      setTimeout(() => {
        document.getElementById('done-overlay').classList.add('show');
      }, 2000);
    });
  }
}

function startTicker() {
  clearInterval(ticker);
  running = true;
  document.getElementById('btn-start').textContent = 'pausa';
  ticker = setInterval(() => {
    if (remaining <= 0) { clearInterval(ticker); nextStep(); return; }
    remaining--;
    updateClock();
  }, 1000);
}

document.getElementById('btn-start').addEventListener('click', () => {
  ensureAudio();
  if (running) {
    stopTimer();
    document.getElementById('btn-start').textContent = 'riprendi';
  } else {
    startTicker();
  }
});

document.getElementById('btn-reset').addEventListener('click', () => {
  stopTimer();
  document.getElementById('btn-start').textContent = 'avvia';
  loadStep(0);
});
</script>
